# Nginx Configuration for React Router SPA
# Semua request yang bukan file/folder, arahkan ke index.html
# Ini penting biar routing client-side React Router jalan dengan benar

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # ==========================================
    # SECURITY HEADERS
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # ==========================================
    # SPA ROUTING FALLBACK
    # ==========================================
    # Semua request yang bukan static file harus diarahkan ke index.html
    # Ini biar React Router bisa handle route-nya client-side
    location / {
        try_files $uri $uri/ /index.html;
        # Cache policy untuk SPA
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ==========================================
    # STATIC ASSETS CACHING
    # ==========================================
    # CSS, JS, images - cache selamanya karena Vite hashing filenya
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|ttf|woff|woff2|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==========================================
    # GZIP COMPRESSION
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/x-javascript 
        application/xml+rss 
        application/javascript 
        application/json 
        application/octet-stream;
    gzip_disable "MSIE [1-6]\.";

    # ==========================================
    # HEALTH CHECK ENDPOINT
    # ==========================================
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ==========================================
    # DENY ACCESS TO SENSITIVE FILES
    # ==========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
